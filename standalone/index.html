<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="x-dns-prefetch-control" content="off">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' data:; script-src 'self' 'unsafe-inline'; img-src 'self' data: https: http:; frame-src https://www.youtube.com https://www.youtube-nocookie.com; connect-src 'self' https://orquidealucinada.net">
    <title>Libretas de Notas</title>
    <script src="marked.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background: #1b1b1b; 
            min-height: 100vh;
            color: #e0e0e0;
        }

        .hamburger-btn {
            position: fixed;
            top: 15px;
            left: 15px;
            width: 45px;
            height: 45px;
            background: #2a2a2a;
            border: 1px solid #444;
            border-radius: 10px;
            color: #e0e0e0;
            font-size: 20px;
            cursor: pointer;
            z-index: 2001;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 2px 2px 0 #000;
        }

        .hamburger-btn:hover { background: #3a3a3a; }

        .sidebar {
            width: 260px;
            background: #242424;
            border-right: 2px solid #444;
            display: flex;
            flex-direction: column;
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            z-index: 2000;
            transform: translateX(-100%);
        }

        .sidebar.open { transform: translateX(0); }

        .sidebar-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            display: none;
            z-index: 1999;
        }

        .sidebar-overlay.show { display: block; }

        .sidebar-header {
            padding: 15px;
            border-bottom: 1px solid #444;
            text-align: center;
            margin-top: 60px;
        }

        .sidebar-header h1 {
            font-size: 1.3rem;
            margin-bottom: 3px;
            text-shadow: 2px 2px 0px #000;
        }

        .sidebar-header p {
            font-size: 0.8rem;
            opacity: 0.7;
        }

        .notebooks-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .notebook-item {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 10px;
            padding: 6px 8px;
            background: #2a2a2a;
            border-radius: 10px;
            border: 2px solid #444;
            cursor: pointer;
            position: relative;
        }

        .notebook-item:hover { border-color: #666; background: #333; }
        .notebook-item.active { border-color: #4f46e5; background: #2e2e3e; }

        .notebook-icon {
            width: 56px;
            height: 73px;
            flex-shrink: 0;
            pointer-events: none;
        }

        .notebook-icon svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.5));
        }

        .notebook-title {
            font-weight: bold;
            font-size: 0.85rem;
            text-align: left;
            margin-bottom: 2px;
            word-break: break-word;
            pointer-events: none;
        }

        .notebook-count {
            font-size: 0.7rem;
            opacity: 0.7;
            background: #3a3a3a;
            padding: 1px 6px;
            border-radius: 8px;
            pointer-events: none;
            display: inline-block;
        }

        .notebook-info {
            flex: 1;
            min-width: 0;
        }

        .notebook-actions {
            display: flex;
            gap: 3px;
            flex-shrink: 0;
            flex-direction: column;
            align-items: center;
        }

        .notebook-actions-row {
            display: flex;
            gap: 3px;
        }

        .btn-icon {
            background: #3a3a3a;
            border: 1px solid #555;
            color: #e0e0e0;
            width: 26px;
            height: 26px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s, border-color 0.15s;
        }

        .btn-icon:hover { background: #555; border-color: #777; }
        .btn-icon.btn-link { color: #79addc; border-color: #2e4a6e; background: #1e2a3a; }
        .btn-icon.btn-link:hover { background: #2e3a4a; border-color: #4a7aac; }
        .btn-icon.btn-link.linked { color: #fbbf24; border-color: #78520a; background: #2a1e00; }
        .btn-icon.btn-link.linked:hover { background: #3a2e00; }
        .btn-icon.btn-delete { color: #f87171; border-color: #7f1d1d; background: #2a1010; }
        .btn-icon.btn-delete:hover { background: #3a1818; border-color: #b91c1c; }

        .color-btn-wrapper {
            position: relative;
            width: 26px;
            height: 26px;
            border-radius: 6px;
            border: 1px solid #555;
            overflow: visible;
            cursor: pointer;
        }

        .color-btn-display {
            width: 100%;
            height: 100%;
            border-radius: 5px;
            pointer-events: none;
        }

        /* Grilla de colores */
        .color-grid-popup {
            display: none;
            position: absolute;
            right: 0;
            top: 30px;
            background: #242424;
            border: 1px solid #555;
            border-radius: 8px;
            padding: 6px;
            grid-template-columns: repeat(4, 22px);
            gap: 4px;
            z-index: 9999;
            box-shadow: 2px 4px 12px rgba(0,0,0,0.7);
        }

        .color-grid-popup.open { display: grid; }

        .color-swatch {
            width: 22px;
            height: 22px;
            border-radius: 4px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: border-color 0.1s, transform 0.1s;
        }

        .color-swatch:hover { border-color: #fff; transform: scale(1.15); }

        /* Modal de libretas relacionadas */
        .link-modal-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 5000;
            display: flex;
            align-items: center;
            justify-content: center;
            display: none;
        }

        .link-modal-backdrop.open { display: flex; }

        .link-modal {
            background: #242424;
            border: 1px solid #555;
            border-radius: 12px;
            padding: 20px;
            min-width: 260px;
            max-width: 320px;
            width: 90%;
            box-shadow: 2px 4px 20px rgba(0,0,0,0.8);
        }

        .link-modal h3 {
            margin-bottom: 14px;
            font-size: 0.95rem;
            border-bottom: 1px solid #444;
            padding-bottom: 8px;
        }

        .link-modal-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-height: 300px;
            overflow-y: auto;
            margin-bottom: 14px;
        }

        .link-modal-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 7px 10px;
            border-radius: 8px;
            background: #2a2a2a;
            border: 1px solid #444;
            cursor: pointer;
            transition: background 0.15s;
        }

        .link-modal-item:hover { background: #333; }
        .link-modal-item.selected { background: #2e2e3e; border-color: #4f46e5; }

        .link-modal-item input[type=checkbox] { accent-color: #4f46e5; width: 16px; height: 16px; }

        /* Indicador de libreta en ficha: clicable */
        .note-nb-badge {
            cursor: pointer;
            padding: 2px 7px;
            border-radius: 4px;
            font-size: 0.7rem;
            display: inline-flex;
            align-items: center;
            gap: 3px;
            background: #353535;
            border: 1px solid transparent;
            transition: background 0.15s;
            position: relative;
            text-shadow: 1px 1px 0 var(--bg-primary);
        }

        .note-nb-badge:hover { background: #404040; }
        .note-nb-badge.has-links { border-color: #78520a; background: #2a2000; }
        .note-nb-badge.has-links:hover { background: #3a2e00; }

        /* Tooltip de libretas relacionadas */
        #globalTooltip {
            position: fixed;
            background: #777777;
            border: 1px solid #555;
            border-radius: 7px;
            padding: 7px 10px;
            font-size: 0.75rem;
            white-space: nowrap;
            z-index: 99999;
            pointer-events: none;
            box-shadow: 2px 2px 8px rgba(0,0,0,0.5);
            color: #e0e0e0;
            display: none;
            line-height: 1.6;
        }
        body.light #globalTooltip { background: #f0f0f0; border-color: #aaa; color: #222; }

        /* Vista de libretas relacionadas agrupadas */
        .related-group-header {
            grid-column: 1 / -1;
            padding: 8px 12px;
            margin-top: 10px;
            font-weight: bold;
            font-size: 0.85rem;
            border-left: 3px solid;
            background: #555555;
            border-radius: 0 6px 6px 0;
            color: #eeeeee;
        }

        .sidebar-section { border-top: 1px solid #444; }

        .section-header {
            padding: 10px 15px;
            background: #2a2a2a;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            font-size: 0.85rem;
            user-select: none;
        }

        .section-header:hover { background: #333; }
        .section-toggle { font-size: 0.7rem; }

        .section-content {
            max-height: 0;
            overflow: hidden;
        }

        .section-content.expanded {
            max-height: 500px;
            padding: 10px 15px;
        }

        .btn {
            padding: 8px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            margin-bottom: 6px;
            font-size: 12px;
            box-shadow: 1px 1px 2px #000;
        }

        .btn:hover { filter: brightness(1.15); }
        .btn-primary { background: #4f46e5; color: white; }
        .btn-success { background: #10b981; color: white; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-ghost { background: #2e4a6e; color: #c8dff5; }

        .input-field {
            width: 100%;
            padding: 8px;
            margin: 4px 0;
            border: 1px solid #444;
            border-radius: 6px;
            background: #2a2a2a;
            color: #e0e0e0;
            font-size: 0.85rem;
        }

        .input-field:focus { outline: none; border-color: #4f46e5; }

        .sidebar-header {
            display: none;
        }

        .app-header {
            text-align: center;
            margin-bottom: 4px;
            margin-top:10px;
        }

        .app-title {
            display: inline-flex;
            align-items: baseline;
            gap: 8px;
            font-size: 1.3rem;
            font-weight: bold;
            text-shadow: 2px 2px 0 #000;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            opacity: 0.85;
            transition: opacity 0.15s;
        }

        .app-title:hover { opacity: 1; }

        .app-title span {
            font-size: 0.8rem;
            font-weight: normal;
            opacity: 0.5;
        }

        .main-content {
            flex: 1;
            padding: 20px;
            padding-top: 20px;
            min-height: 100vh;
            width: 100%;
        }

        .top-bar {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            gap: 10px;
            flex-wrap: wrap;
        }

        .search-box {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .search-box input {
            padding: 8px 14px;
            border: 1px solid #444;
            border-radius: 8px;
            background: #2a2a2a;
            color: #e0e0e0;
            font-size: 14px;
            width: 240px;
        }

        .search-box input:focus { outline: none; border-color: #4f46e5; }

        .controls {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .sort-select {
            padding: 8px 12px;
            border: 1px solid #444;
            border-radius: 8px;
            background: #2a2a2a;
            color: #e0e0e0;
            cursor: pointer;
        }

        #themeToggleBtn {
            cursor: pointer;
            font-size: 20px;
            padding: 1px 5px 1px 5px;
            background: #2a2a2a;
            border: 1px solid #444;
            border-radius: 8px;
        }

        .view-info {
            margin-bottom: 15px;
            padding: 12px 15px;
            background: #555555;
            border-radius: 8px;
            border-left: 4px solid #4f46e5;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .view-info h2 {
            margin: 0;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .filter-info {
            margin-bottom: 15px;
            padding: 10px 15px;
            background: #2a2a2a;
            border-radius: 8px;
            display: none;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .filter-info.show { display: flex; }

        .filter-badge {
            background: #4f46e5;
            color: white;
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .filter-badge button {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }

        .notes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
        }

        .note-card {
            background: #2e2e2e;
            border-radius: 10px;
            padding: 15px;
            border: 1px solid #444;
            box-shadow: 2px 2px 0 #000;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            height: 360px;
            overflow: hidden;
            color: #fff;
        }

        .note-card:hover {
            transform: translateY(-2px);
            box-shadow: 4px 4px 0 #000;
            border-color: #666;
        }

        .note-title {
            font-size: 1rem;
            font-weight: bold;
            margin-bottom: 6px;
            color: #fff;
            line-height: 1.3;
        }

        .note-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            font-size: 0.7rem;
            opacity: 0.8;
            margin-bottom: 8px;
        }

        .note-meta span {
            background: #3a3a3a;
            padding: 2px 6px;
            border-radius: 4px;
        }

        .note-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-bottom: 10px;
        }

        .tag {
            background: #1e2a3a;
            color: #79addc;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 10px;
            cursor: pointer;
            border: 1px solid #333;
        }

        .tag:hover { background: #2a3a4a; }
        .tag-urgente { background: #7f1d1d; color: #fecaca; }
        .tag-importante { background: #14532d; color: #bbf7d0; }

        .note-preview {
            color: #ccc;
            font-size: 0.78rem;
            line-height: 1.5;
            flex: 1;
            overflow: hidden;
            mask-image: linear-gradient(to bottom, black 60%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, black 60%, transparent 100%);
        }
        .note-preview ul, .note-preview ol { padding-left: 1.2em; margin: 2px 0; }
        .note-preview li { margin: 1px 0; }
        .note-preview ul ul, .note-preview ol ol, .note-preview ul ol, .note-preview ol ul { padding-left: 1.2em; }
        .note-preview p { margin: 2px 0; }
        .note-preview h1, .note-preview h2, .note-preview h3 { font-size: 0.85rem; margin: 3px 0; }
        .note-preview input[type=checkbox] { pointer-events: none; margin-right: 3px; }
        .note-preview .done-item { background: #1a5c2a; color: #fff; border-radius: 3px; padding: 0 3px; }
        .note-preview code { background: #333; color: #f48fb1; padding: 1px 3px; border-radius: 2px; font-size: 0.75rem; }
        .note-preview pre { background: #111; padding: 4px 8px; border-radius: 4px; overflow: hidden; font-size: 0.72rem; }

        .add-note-card {
            background: transparent;
            border: 2px dashed #555;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 360px;
            min-height: 160px;
            cursor: pointer;
            font-size: 2.5rem;
            color: #666;
            border-radius: 10px;
        }

        .add-note-card:hover {
            border-color: #888;
            color: #aaa;
            background: #2c2c2c;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            opacity: 0.5;
            grid-column: 1 / -1;
        }

        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            display: none;
            z-index: 3000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal.show { display: flex; }

        .modal-content {
            background: #242424;
            color: #e0e0e0;
            padding: 25px;
            border-radius: 12px;
            width: 100%;
            max-width: 900px;
            height: 98vh;
            max-height: 98vh;
            overflow-y: auto;
            border: 1px solid #444;
            display: flex;
            flex-direction: column;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 12px;
            border-bottom: 1px solid #444;
        }

        .toolbar {
            display: flex;
            gap: 4px;
            background: #333;
            padding: 6px;
            border: 1px solid #555;
            border-bottom: none;
            border-radius: 6px 6px 0 0;
            flex-wrap: wrap;
        }

        .toolbar select, .toolbar button {
            padding: 5px 8px;
            cursor: pointer;
            font-size: 11px;
            font-weight: bold;
            border-radius: 4px;
            border: 1px solid #555;
            background: #2a2a2a;
            color: #ddd;
        }

        #toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 13px;
            z-index: 9999;
            display: none;
        }

        #toast.success { background: #10b981; color: white; }
        #toast.error { background: #ef4444; color: white; }
        #toast.show { display: block; }

        .markdown-content h1 { font-size: 1.6rem; margin: 12px 0 8px; border-bottom: 2px solid #444; padding-bottom: 4px; }
        .markdown-content h2 { font-size: 1.3rem; margin: 10px 0 6px; border-bottom: 1px solid #444; padding-bottom: 3px; }
        .markdown-content pre { background: #111; padding: 12px; border-radius: 6px; overflow-x: auto; }
        .markdown-content code { background: #333; color: #f48fb1; padding: 2px 5px; border-radius: 3px; }
        .markdown-content img { max-width: 100%; height: auto; border-radius: 6px; display: block; }
        .markdown-content ul, .markdown-content ol { padding-left: 1.6em; margin: 6px 0; }
        .markdown-content li { margin: 3px 0; }
        .markdown-content ul ul, .markdown-content ol ol, .markdown-content ul ol, .markdown-content ol ul { padding-left: 1.4em; margin: 2px 0; }
        .markdown-content p { margin: 6px 0; }
        /* Tablas markdown */
        .markdown-content table { border-collapse: collapse; width: 100%; margin: 10px 0; font-size: 0.88rem; }
        .markdown-content th { background: #333; color: #e0e0e0; padding: 7px 12px; border: 1px solid #555; text-align: left; font-weight: bold; }
        .markdown-content td { padding: 6px 12px; border: 1px solid #444; }
        .markdown-content tr:nth-child(even) td { background: #242424; }
        .markdown-content tr:nth-child(odd) td { background: #1e1e1e; }
        .markdown-content tr:hover td { background: #2a2a3a; }
        body.light .markdown-content th { background: #c0c0c0; color: #111; border-color: #aaa; }
        body.light .markdown-content td { border-color: #bbb; }
        body.light .markdown-content tr:nth-child(even) td { background: #e0e0e0; }
        body.light .markdown-content tr:nth-child(odd) td { background: #ececec; }
        body.light .markdown-content tr:hover td { background: #d8d8f0; }
        /* Videos embed (iframe) */
        .markdown-content iframe { max-width: 100%; border-radius: 6px; border: none; display: block; margin: 8px 0; }
        /* Checklists en preview */
        .markdown-content input[type=checkbox] { cursor: pointer; margin-right: 5px; accent-color: #10b981; width: 15px; height: 15px; vertical-align: middle; }
        .markdown-content li.task-list-item { list-style: none; margin-left: -1em; padding: 2px 4px; border-radius: 4px; }
        .markdown-content li.task-list-item.checked { /*background: #145228;*/ color: #fff; }
        /* Metadata contraíble en móvil */
.meta-toggle-btn { 
    width: 100%; 
    padding: 6px 10px; 
    background: #333; 
    border: 1px solid #555; 
    border-radius: 6px; 
    color: #ccc; 
    cursor: pointer; 
    font-size: 0.8rem; 
    text-align: left; 
    margin-bottom: 4px; 
}
.meta-collapsible { 
    transition: none;
    overflow: visible; 
}
.meta-collapsible.collapsed { 
    display: none; 
}

        .preview-body { background: #1a1a1a; padding: 20px; border-radius: 8px; max-height: 90vh; overflow-y: auto; color: #e0e0e0; }

        body.light .preview-body { background: #c3c3c3; color: #000; }

<script type="text/plain" id="readme-es">
# 📚 Libretas de Notas

Sistema de gestión de notas con libretas virtuales, editor Markdown, etiquetas, búsqueda global y exportación JSON.

Sin backend para facilitar el uso y la portabilidad, guarda los datos en el localStorage del navegador, pudiendo exportar todo el contenido a un archivo .json con fecha y hora en el nombre del archivo.

El sistema consta sólo de dos archivos: `notebook.html` y `marked.min.js`. Se incluye una copia local de `marked.min.js` para poder renderizar Markdown sin necesidad de conexión a internet.

## Pantalla de inicio

Al abrir la app o hacer clic en el título "📚 Libretas de Notas" se muestra la **pantalla de inicio** con todas las libretas en una grilla visual. Hacé clic en cualquier libreta para ver sus notas, o usá el botón **+** para crear una nueva.

Las notas fijadas 📌 aparecen arriba de todo, antes de las libretas. Hacé clic en una para abrir su preview.

## Sidebar (☰)

El botón ☰ abre el panel lateral con:
- **➕ Nueva Libreta**: Crear libretas con nombre personalizado
- **💾 Backup**: Exportar e importar datos en JSON
- **📖 README**: Este manual

## Libretas

Cada libreta tiene botones para cambiar color (paleta de 16 colores), enlazar con otras (🔗), renombrar (✎) y eliminar (🗑).

## Notas

Las tarjetas muestran título, autor, libreta, fechas, tamaño y etiquetas. Clic en tarjeta → abre preview. El botón **+** grande crea una nueva nota en la libreta activa.

## Editor

Barra de herramientas: **Hn** (encabezados H1–H3), **B** (negrita), **I** (cursiva), **Cód** (bloque), **`** (inline), **List**, **☐** (checklist), **"** (cita), **🔗** (enlace), **🖼️** (imagen URL), **—** (separador).

También podés importar archivos .md (con o sin frontmatter YAML) y exportar como .md.

## Videos de YouTube

Usá el iframe de embed directamente en el Markdown:
```
<iframe width="560" height="315" src="https://www.youtube.com/embed/ID_VIDEO" allowfullscreen></iframe>
```
Reemplazá `ID_VIDEO` con los caracteres que aparecen después de `v=` en la URL del video.

## Vista previa

-   **Checklists** interactivos (marcar/desmarcar guarda el cambio)
    
-   **Tablas Markdown** con bordes y filas diferenciadas
    
-   **Metadatos** contraíbles en móvil (botón ▶ Metadatos)
    
-   Clic en etiqueta → filtra; clic en libreta → va a esa libreta
    
-   El botón 📌 fija/desfija la nota. Las notas fijadas aparecen en la pantalla de inicio.
    

## Filtros y búsqueda

-   **Búsqueda**: Busca en **todas las notas** (título, autor, contenido, etiquetas)
    
-   🏷️: El botón al lado de la búsqueda abre un dropdown con todas las etiquetas para filtrar globalmente.
    
-   **Etiquetas**: Filtran globalmente
    
-   **Libreta activa**: Solo filtra la vista cuando no hay búsqueda ni etiqueta activa
    
-   **Ver todas**: Desactiva el filtro de libreta
    

## Libretas enlazadas (🔗)

**💡 ¿Para qué sirve enlazar libretas?**  
Enlazar dos o más libretas crea una relación temática o estructural entre ellas. No es una simple etiqueta: es una forma de agrupar conjuntos de notas que pertenecen a un mismo proyecto, idea o contexto.

**Ejemplos prácticos:**

-   Si tienes una libreta "Poemas" y otra "Borradores de poemas", al enlazarlas podrás ver, desde cualquier nota de "Poemas", también todas las notas de "Borradores" (y viceversa).
    
-   Un proyecto de escritura: libretas "Investigación", "Personajes", "Capítulos". Enlázalas para tener una vista unificada.
    
-   Un diario personal: libretas "2023", "2024", "Reflexiones". Al enlazarlas, el badge 🔗 en cualquier nota te mostrará las notas de las tres.
    

**Comportamiento técnico:**

-   Los enlaces son **bidireccionales**: si enlazas A con B, automáticamente B queda enlazada con A.
    
-   Al hacer clic en el badge 🔗 que aparece en las notas pertenecientes a libretas enlazadas, se abre una **vista agrupada** especial: se muestran todas las notas de la libreta actual, seguidas de las notas de cada libreta enlazada, cada grupo con su cabecera de color. Puedes añadir nuevas notas a cualquier grupo desde esa misma vista.
    
-   No hay límite de cuántas libretas puedes enlazar.
    

**Consejo de uso:** Usa los enlaces para construir **contextos de trabajo** más amplios que una sola libreta, sin perder la organización por separado.

## Etiquetas especiales

-   `urgente` → rojo
    
-   `importante` → verde
    

## Backup y datos

-   **Exportar JSON**: Descarga backup completo
    
-   **Importar JSON**: Restaura desde backup
    
-   **Alerta al salir**: Si hubo cambios, al cerrar la página se ofrece hacer backup
    
-   **⚠️ Borrar Todo**: Elimina todo (con confirmación)
    

## Temas

El botón ☀️/🌙 alterna tema oscuro/claro. La preferencia se guarda.

# 📚 Notebooks

Note management system with virtual notebooks, Markdown editor, tags, global search, and JSON export.  

Without a backend for ease of use and portability, it saves data to the browser's localStorage, allowing you to export all content to a .json file with the date and time embedded in the filename.

The system consists of only two files: `notebook.html` and `marked.min.js`. A local copy of `marked.min.js` is included to enable rendering Markdown without an internet connection.

## Home Screen

Opening the app or clicking "📚 Libretas de Notas" shows the **home screen** with all notebooks in a visual grid. Click any notebook to see its notes, or use the **+** button to create a new one.

Pinned notes 📌 appear at the top, before the notebooks. Click on one to open a preview.

## Sidebar (☰)

The ☰ button opens the side panel with:

-   **➕ New Notebook**: Create notebooks with a custom name
-   **💾 Backup**: Export and import data as JSON
-   **📖 README**: This manual

## Notebooks

Each notebook has buttons to change color (16-color palette), link to others (🔗), rename (✎), and delete (🗑).

## Notes

Note cards show title, author, notebook, dates, size, and tags. Click a card to open the preview. The large **+** card creates a new note in the active notebook.

## Editor

Toolbar: **Hn** (headings H1–H3), **B** (bold), **I** (italic), **Cód** (code block), **`** (inline code), **List**, **☐** (checklist), **"** (blockquote), **🔗** (link), **🖼️** (image URL), **—** (horizontal rule).

You can also import .md files (with or without YAML frontmatter) and export notes as .md.

## YouTube Videos

Use the embed iframe directly in Markdown:
```
<iframe width="560" height="315" src="https://www.youtube.com/embed/VIDEO_ID" allowfullscreen></iframe>
```

Replace `VIDEO_ID` with the characters after `v=` in the video URL.

## Preview

-   Interactive **checklists** (checking/unchecking saves the change)
    
-   **Markdown tables** with borders and alternating rows
    
-   **Metadata** collapsible on mobile (▶ Metadatos button)
    
-   Click tag → filter; click notebook name → go to that notebook
    
-   The 📌 button pin/unpin the note. Fixed notes appear on the home screen.
    

## Filters & Search

-   **Search**: Searches **all notes** (title, author, content, tags)
    
-   🏷️: The button next to the search opens a dropdown with all the tags to filter globally.
    
-   **Tags**: Filter globally across all notebooks
    
-   **Active notebook**: Only filters the view when no search or tag filter is active
    
-   **View all**: Clears notebook filter
    

## Linked Notebooks (🔗)

**💡 What is the purpose of linking notebooks?**  
Linking two or more notebooks creates a thematic or structural relationship between them. It is not just a tag; it is a way to group sets of notes that belong to the same project, idea, or context.

**Practical examples:**

-   If you have a notebook "Poems" and another "Drafts of poems", linking them allows you to see, from any note in "Poems", all notes in "Drafts" (and vice versa).
    
-   A writing project: notebooks "Research", "Characters", "Chapters". Link them to have a unified view.
    
-   A personal journal: notebooks "2023", "2024", "Reflections". When linked, the 🔗 badge on any note will show you notes from all three.
    

**Technical behavior:**

-   Links are **bidirectional**: if you link A with B, B automatically becomes linked with A.
    
-   Clicking the 🔗 badge that appears on notes belonging to linked notebooks opens a special **grouped view**: all notes from the current notebook are shown, followed by notes from each linked notebook, each group with its colored header. You can add new notes to any group from that same view.
    
-   There is no limit on how many notebooks you can link.
    

**Usage tip:** Use links to build **broader working contexts** that go beyond a single notebook, without losing separate organization.

## Special Tags

-   `urgente` → red
    
-   `importante` → green
    

## Backup & Data

-   **Export JSON**: Download full backup
    
-   **Import JSON**: Restore from backup
    
-   **Leave alert**: If there are unsaved changes, closing the page offers a backup
    
-   **⚠️ Delete All**: Clears all data (with confirmation)
    

## Themes

The ☀️/🌙 button toggles dark/light theme. Preference is saved.

marked.use({ gfm: true, breaks: true });

const storage = (() => {
    try { 
        localStorage.setItem('_test', '1'); 
        localStorage.removeItem('_test'); 
        return localStorage; 
    } catch(e) { 
        const m = {}; 
        return { 
            getItem: k => m[k] || null, 
            setItem: (k,v) => { m[k] = v; }, 
            removeItem: k => { delete m[k]; }, 
            clear: () => { for(let k in m) delete m[k]; } 
        }; 
    }
})();

const defaultData = {
    notebooks: [
        { id: 1, name: 'General', color: '#4A90D9' },
        { id: 2, name: 'Ideas', color: '#10b981' }
    ],
    notes: {
        1: {
            id: 1,
            notebookId: 1,
            title: 'Bienvenido',
            author: 'Sistema',
            content: '# ¡Bienvenido!\n\nSistema de **libretas de notas**.\n\n- 📝 Notas Markdown\n- 🔍 Búsqueda global\n- 💾 Exportación',
            tags: ['bienvenida'],
            createdAt: Date.now(),
            updatedAt: Date.now()
        }
    },
    nextNotebookId: 3,
    nextNoteId: 2
};

let appData = JSON.parse(storage.getItem('notebooksData')) || defaultData;
let currentNotebookId = null; // null = todas las notas
let currentNoteId = null;
let activeSearch = '';
let activeTagFilter = '';
let sidebarOpen = false;
let relatedViewNotebookId = null; // si estamos en vista de relacionadas, guarda el nbId raíz

function saveData() {
    storage.setItem('notebooksData', JSON.stringify(appData));
    const badge = document.getElementById('unsavedBadge');
    if (badge) badge.style.display = 'inline';
}

function formatBytes(bytes) {
    if (bytes === 0) return '0 B';
    const k = 1024;
    const sizes = ['B', 'KB', 'MB'];
    const i = Math.floor(Math.log(bytes) / Math.log(k));
    return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
}

function formatDate(ts) {
    return new Date(ts).toLocaleDateString('es-AR', { day: '2-digit', month: '2-digit', year: 'numeric' });
}

function formatDateTime(ts) {
    return new Date(ts).toLocaleString('es-AR', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' });
}

function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `show ${type}`;
    setTimeout(() => { t.className = ''; }, 2500);
}

function toggleSidebar() {
    sidebarOpen = !sidebarOpen;
    document.getElementById('sidebar').classList.toggle('open', sidebarOpen);
    document.getElementById('sidebarOverlay').classList.toggle('show', sidebarOpen);
}

function toggleSection(header) {
    const content = header.nextElementSibling;
    const toggle = header.querySelector('.section-toggle');
    const isExpanded = content.classList.contains('expanded');
    
    document.querySelectorAll('.section-content.expanded').forEach(c => {
        c.classList.remove('expanded');
        c.previousElementSibling.querySelector('.section-toggle').textContent = '▼';
    });
    
    if (!isExpanded) {
        content.classList.add('expanded');
        toggle.textContent = '▲';
    }
}

function hexToRgb(hex) {
    const r = parseInt(hex.slice(1,3),16);
    const g = parseInt(hex.slice(3,5),16);
    const b = parseInt(hex.slice(5,7),16);
    return {r,g,b};
}

function darkenHex(hex, factor=0.6) {
    const {r,g,b} = hexToRgb(hex);
    const d = v => Math.round(v * factor).toString(16).padStart(2,'0');
    return `#${d(r)}${d(g)}${d(b)}`;
}

function getNotebookSVG(color) {
    const dark = darkenHex(color, 0.62);
    return `<svg width="230" height="300" viewBox="0 0 230 300" xmlns="http://www.w3.org/2000/svg">
        <rect fill="${dark}" height="266" stroke="#000" stroke-linecap="round" stroke-linejoin="round" stroke-width="3.5" transform="matrix(.99963 -.02708 .02708 .99963 0 -752)" width="198" x="-7.5" y="767.9"/>
        <path d="m13.3,16l193.9,0.1l7.2,265.9l-194,-0.1l-7.1,-265.9z" fill="#ffffff" stroke="#c3c3c3"/>
        <path d="m12.3,17.5l192.4,0.2l7.6,265.9l-192.8,-0.2l-7.2,-265.9z" fill="#ffffff" stroke="#c3c3c3"/>
        <path d="m11.3,18l190.9,1.1l7.2,265.9l-191,-1.1l-7.1,-265.9z" fill="#ffffff" stroke="#c3c3c3"/>
        <path d="m12.2,15.4l186.9,2.6l7.2,269.9l-189,-4.6l-5.1,-267.9z" fill="${color}" stroke="#000" stroke-linecap="round" stroke-linejoin="round" stroke-width="3.5"/>
        <path d="m77.6,105c17.8,0.2 34.8,0.3 53.3,-0.2c21.8,-0.1 26.5,-3.6 27,18l0.7,33.2c1.5,19.3 -6.9,16.4 -26.1,16.1c-18.9,-0.3 -36.7,-0.5 -53.4,-0.3c-21.5,0 -26,0.6 -26.6,-17.5l-1,-32.8c-1,-19.2 7.2,-16.7 26.1,-16.5z" fill="#ffffff" stroke="#696969" stroke-width="2"/>
        <line stroke="#000" x1="64.7" x2="145.4" y1="123" y2="123"/>
        <line stroke="#000" x1="64.1" x2="144.9" y1="138" y2="138"/>
        <line stroke="#000" x1="64.6" x2="145.4" y1="152" y2="152"/>
    </svg>`;
}

function renderNotebooks() {
    const container = document.getElementById('notebooksList');
    container.innerHTML = '';
    
    appData.notebooks.forEach(nb => {
        const count = Object.values(appData.notes).filter(n => n.notebookId === nb.id).length;
        const links = nb.links || [];
        const isLinked = links.length > 0;
        
        const div = document.createElement('div');
        div.className = `notebook-item ${currentNotebookId === nb.id ? 'active' : ''}`;
        
        div.onclick = (e) => {
            if (e.target.closest('.notebook-actions')) return;
            if (e.target.closest('.color-grid-popup')) return;
            selectNotebook(nb.id);
            toggleSidebar();
        };
        
        // Grilla 4x4 de 16 colores básicos compatibles con TTY

        const palette = ['#000000', '#800000', '#008000', '#808000', '#000080', '#800080', '#008080', '#C0C0C0', '#555555', '#FF0000', '#00FF00', '#FFFF00', '#0000FF', '#FF00FF', '#00FFFF', '#FFFFFF'];
        const swatches = palette.map(c => 
            `<div class="color-swatch" style="background:${c}" onclick="event.stopPropagation();changeColor(${nb.id},'${c}');closeColorGrid(${nb.id})" title="${c}"></div>`
        ).join('');
        
        div.innerHTML = `
            <div class="notebook-icon">
                ${getNotebookSVG(nb.color)}
            </div>
            <div class="notebook-info">
                <div class="notebook-title">${nb.name}</div>
                <div class="notebook-count">${count} nota${count !== 1 ? 's' : ''}</div>
            </div>
            <div class="notebook-actions">
                <div class="notebook-actions-row">
                    <div class="color-btn-wrapper btn-icon" title="Cambiar color" onclick="event.stopPropagation();toggleColorGrid(${nb.id})" id="colorBtn_${nb.id}">
                        <div class="color-btn-display" style="background:${nb.color}"></div>
                        <div class="color-grid-popup" id="colorGrid_${nb.id}" onclick="event.stopPropagation()">
                            ${swatches}
                        </div>
                    </div>
                    <button class="btn-icon btn-link ${isLinked ? 'linked' : ''}" onclick="event.stopPropagation();openLinkModal(${nb.id})" title="${isLinked ? 'Enlazada con: '+links.map(id=>{const n=appData.notebooks.find(x=>x.id===id);return n?n.name:'?';}).join(', ') : 'Enlazar con otra libreta'}">🔗</button>
                </div>
                <div class="notebook-actions-row">
                    <button class="btn-icon" onclick="event.stopPropagation();renameNotebook(${nb.id})" title="Renombrar">✎</button>
                    <button class="btn-icon btn-delete" onclick="event.stopPropagation();deleteNotebook(${nb.id})" title="Eliminar">🗑</button>
                </div>
            </div>
        `;
        
        container.appendChild(div);
    });
}

function toggleColorGrid(nbId) {
    const grid = document.getElementById(`colorGrid_${nbId}`);
    const allGrids = document.querySelectorAll('.color-grid-popup.open');
    allGrids.forEach(g => { if (g.id !== `colorGrid_${nbId}`) g.classList.remove('open'); });
    grid.classList.toggle('open');
    if (grid.classList.contains('open')) {
        // Cerrar al hacer clic fuera
        setTimeout(() => {
            document.addEventListener('click', function closeGrid(e) {
                if (!grid.contains(e.target)) {
                    grid.classList.remove('open');
                    document.removeEventListener('click', closeGrid);
                }
            });
        }, 10);
    }
}

function closeColorGrid(nbId) {
    const grid = document.getElementById(`colorGrid_${nbId}`);
    if (grid) grid.classList.remove('open');
}

let linkModalNotebookId = null;

function openLinkModal(nbId) {
    linkModalNotebookId = nbId;
    const nb = appData.notebooks.find(n => n.id === nbId);
    const currentLinks = nb.links || [];
    const list = document.getElementById('linkModalList');
    
    list.innerHTML = appData.notebooks
        .filter(n => n.id !== nbId)
        .map(n => {
            const checked = currentLinks.includes(n.id);
            return `<label class="link-modal-item ${checked ? 'selected' : ''}">
                <input type="checkbox" value="${n.id}" ${checked ? 'checked' : ''}
                    onchange="this.closest('.link-modal-item').classList.toggle('selected',this.checked)">
                <span style="color:${n.color}">🕮</span>
                <span>${n.name}</span>
            </label>`;
        }).join('');
    
    if (appData.notebooks.length < 2) {
        list.innerHTML = '<div style="opacity:0.6;font-size:0.85rem;padding:8px;">No hay otras libretas.</div>';
    }
    
    // Mostrar botón "Ver fichas" solo si ya hay relaciones guardadas
    document.getElementById('linkModalViewBtn').style.display = currentLinks.length > 0 ? 'block' : 'none';
    
    document.getElementById('linkModalBackdrop').classList.add('open');
}

function viewLinkedAndClose() {
    const nbId = linkModalNotebookId;
    closeLinkModal();
    toggleSidebar();
    openRelatedNotebooks(nbId);
}

function closeLinkModal() {
    document.getElementById('linkModalBackdrop').classList.remove('open');
    linkModalNotebookId = null;
}

function saveLinkModal() {
    if (!linkModalNotebookId) return;
    const nb = appData.notebooks.find(n => n.id === linkModalNotebookId);
    if (!nb) return;
    
    const checked = [...document.querySelectorAll('#linkModalList input[type=checkbox]:checked')].map(cb => parseInt(cb.value));
    
    // Bidireccional: sincronizar ambas partes
    const oldLinks = nb.links || [];
    
    // Quitar vínculo de las que se deslinkaron
    oldLinks.forEach(otherId => {
        if (!checked.includes(otherId)) {
            const other = appData.notebooks.find(n => n.id === otherId);
            if (other) other.links = (other.links || []).filter(id => id !== linkModalNotebookId);
        }
    });
    
    // Agregar vínculo a las nuevas
    checked.forEach(otherId => {
        const other = appData.notebooks.find(n => n.id === otherId);
        if (other) {
            if (!other.links) other.links = [];
            if (!other.links.includes(linkModalNotebookId)) other.links.push(linkModalNotebookId);
        }
    });
    
    nb.links = checked;
    saveData();
    closeLinkModal();
    renderNotebooks();
    showToast(checked.length > 0 ? `Enlazada con ${checked.length} libreta${checked.length>1?'s':''}` : 'Enlaces eliminados');
}

function selectNotebook(id) {
    currentNotebookId = id;
    relatedViewNotebookId = null;
    // NO limpiar filtros al cambiar de libreta
    showNotesView();
    renderNotebooks();
    renderNotes();
    updateViewInfo();
}

function showAllNotes() {
    currentNotebookId = null;
    relatedViewNotebookId = null;
    showNotesView();
    renderNotebooks();
    renderNotes();
    updateViewInfo();
}

// Filtros de búsqueda y etiqueta SIEMPRE globales; libreta solo filtra si no hay otros filtros activos
function renderNotes() {
    const container = document.getElementById('notesGrid');
    
    // 1. Empezar con TODAS las notas del sistema
    let allNotes = Object.values(appData.notes);
    
    const hasActiveFilters = activeSearch || activeTagFilter;

    // 2. Si hay filtros activos (búsqueda o etiqueta), son GLOBALES: ignorar libreta seleccionada
    // Si no hay filtros, respetar la libreta seleccionada
    let notesToShow = allNotes;
    if (!hasActiveFilters && currentNotebookId) {
        notesToShow = allNotes.filter(n => n.notebookId === currentNotebookId);
    }

    // 3. Aplicar búsqueda GLOBAL
    if (activeSearch) {
        const s = activeSearch.toLowerCase();
        notesToShow = notesToShow.filter(n => 
            n.title.toLowerCase().includes(s) ||
            n.author.toLowerCase().includes(s) ||
            n.content.toLowerCase().includes(s) ||
            n.tags.some(t => t.toLowerCase().includes(s))
        );
    }
    
    // 4. Aplicar filtro de etiqueta GLOBAL
    if (activeTagFilter) {
        notesToShow = notesToShow.filter(n => n.tags.includes(activeTagFilter));
    }
    
    // 5. Ordenar
    const sortType = document.getElementById('sortSelect').value;
    notesToShow.sort((a, b) => {
        switch(sortType) {
            case 'newest': return b.createdAt - a.createdAt;
            case 'oldest': return a.createdAt - b.createdAt;
            case 'title': return a.title.localeCompare(b.title);
            case 'titleDesc': return b.title.localeCompare(a.title);
            case 'size': return new Blob([b.content]).size - new Blob([a.content]).size;
            default: return 0;
        }
    });
    
    container.innerHTML = '';
    
    // Botón agregar solo si hay libreta seleccionada Y no hay filtros activos
    if (currentNotebookId && !hasActiveFilters) {
        const addBtn = document.createElement('div');
        addBtn.className = 'add-note-card';
        addBtn.innerHTML = '+';
        addBtn.onclick = () => openNoteModal();
        container.appendChild(addBtn);
    }
    
    // Mensaje si no hay notas
if (notesToShow.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    empty.style.gridColumn = 'auto'; // no ocupa toda la fila
    empty.style.display = 'flex';
    empty.style.alignItems = 'center';
    empty.style.justifyContent = 'center';
    empty.style.opacity = '0.5';
    empty.style.minHeight = '160px';
    if (!currentNotebookId && !activeSearch && !activeTagFilter) {
        empty.innerHTML = '<div><h3>Selecciona una libreta</h3><p>Haz clic en ☰ para ver tus libretas</p></div>';
    } else if (activeSearch || activeTagFilter) {
        empty.innerHTML = '<div><h3>Sin coincidencias</h3><p>No hay notas que coincidan</p></div>';
    } else {
        empty.innerHTML = '<div><h3>Sin notas</h3><p>Crea una con el botón +</p></div>';
    }
    container.appendChild(empty);
    return;
}
    
    // Renderizar notas
    notesToShow.forEach(note => {
        const card = document.createElement('div');
        card.className = 'note-card';
        card.onclick = () => openPreview(note.id);
        
        const size = new Blob([note.content]).size;
        const notebook = appData.notebooks.find(n => n.id === note.notebookId);
        const links = notebook ? (notebook.links || []) : [];
        const hasLinks = links.length > 0;
        
        let nbBadge = '';
        if (notebook) {
            if (hasLinks) {
                const linkedNames = links.map(id => {
                    const nb = appData.notebooks.find(x => x.id === id);
                    return nb ? `<span style="color:${nb.color}">🕮 ${nb.name}</span>` : '';
                }).filter(Boolean).join('<br>');
                nbBadge = `<span class="note-nb-badge has-links" 
                    onclick="event.stopPropagation();openRelatedNotebooks(${note.notebookId})"
                    onmouseenter="showNbTooltip(event,${note.notebookId})"
                    onmouseleave="hideNbTooltip()">
                    <span style="color:${notebook.color}">🕮</span> ${notebook.name} 🔗
                </span>`;
            } else {
                nbBadge = `<span class="note-nb-badge" 
                    onclick="event.stopPropagation();selectNotebookFromCard(${notebook.id})"
                    title="Ver libreta: ${notebook.name}">
                    <span style="color:${notebook.color}">🕮</span> ${notebook.name}
                </span>`;
            }
        }
        
        card.innerHTML = `
            <div style="margin-bottom: 10px;">
                <div style="font-size: 1rem; font-weight: bold; margin-bottom: 6px; color: #888;text-shadow: 1px 1px 0 #000;">${note.title || 'Sin título'}</div>
                <div class="note-meta">
                    <span>${note.author || 'Sin autor'}</span>
                    ${nbBadge}
                </div>
                <div class="note-meta">
                    <span title="Creación">✦ ${formatDateTime(note.createdAt)}</span>
                    <span title="Modificación">✎ ${note.updatedAt ? formatDateTime(note.updatedAt) : '-'}</span>
                    <span>${formatBytes(size)}</span>
                </div>
            </div>
            <div class="note-tags">
                ${note.tags.map(t => `
                    <span class="tag ${t === 'urgente' ? 'tag-urgente' : t === 'importante' ? 'tag-importante' : ''}" 
                          onclick="event.stopPropagation(); filterTag('${t}')">${t}</span>
                `).join('')}
            </div>
            <div class="note-preview"></div>
        `;
        // Postprocesar checkboxes en la preview de la card (DOM)
        const previewEl = card.querySelector('.note-preview');
        previewEl.innerHTML = marked.parse(note.content);
        previewEl.querySelectorAll('input[type=checkbox]').forEach(cb => {
            const li = cb.closest('li');
            cb.setAttribute('disabled', '');
            if (li) {
                li.classList.add('task-list-item');
                if (cb.checked) li.classList.add('checked');
            }
        });
        
        container.appendChild(card);
    });
}

function updateViewInfo() {
    const info = document.getElementById('viewInfo');
    const title = document.getElementById('viewTitle');
    
    if (currentNotebookId) {
        const nb = appData.notebooks.find(n => n.id === currentNotebookId);
        info.style.display = 'flex';
        title.innerHTML = `<span style="color:${nb?.color || '#fff'}">🕮</span> ${nb?.name || 'Libreta'}`;
    } else {
        info.style.display = 'none';
    }
    
    updateFilterInfo();
}

function updateFilterInfo() {
    const info = document.getElementById('filterInfo');
    const badges = document.getElementById('filterBadges');
    
    let html = '';
    const hasActiveFilters = activeSearch || activeTagFilter;

    if (hasActiveFilters && currentNotebookId) {
        html += `<span style="opacity:0.7;font-size:0.8rem;">🌐 Búsqueda global</span>`;
    }
    if (activeSearch) {
        html += `<span class="filter-badge">🔍 "${activeSearch}"<button onclick="clearFilter('search')">✕</button></span>`;
    }
    if (activeTagFilter) {
        html += `<span class="filter-badge">🏷️ ${activeTagFilter}<button onclick="clearFilter('tag')">✕</button></span>`;
    }
    
    badges.innerHTML = html;
    info.style.display = html ? 'flex' : 'none';
}

function clearFilter(type) {
    if (type === 'search') activeSearch = '';
    if (type === 'tag') {
        activeTagFilter = '';
        document.getElementById('tagFilterBtn').classList.remove('active');
    }
    document.getElementById('searchInput').value = activeSearch;
    renderNotes();
    updateFilterInfo();
}

function showNbTooltip(e, nbId) {
    const nb = appData.notebooks.find(n => n.id === nbId);
    const links = nb ? (nb.links || []) : [];
    const names = links.map(id => {
        const n = appData.notebooks.find(x => x.id === id);
        return n ? `<span style="color:${n.color}">🕮 ${n.name}</span>` : '';
    }).filter(Boolean).join('<br>');
    const t = document.getElementById('globalTooltip');
    t.innerHTML = 'Enlazadas:<br>' + names;
    t.style.display = 'block';
    const rect = e.currentTarget.getBoundingClientRect();
    t.style.left = rect.left + 'px';
    t.style.top = (rect.top - t.offsetHeight - 8) + 'px';
    // Guardar referencia al badge activo para forzar ocultar
    t._activeBadge = e.currentTarget;
}

function hideNbTooltip() {
    document.getElementById('globalTooltip').style.display = 'none';
}

function selectNotebookFromCard(nbId) {

function openRelatedNotebooks(nbId) {
    // Mostrar fichas de la libreta actual + todas sus relacionadas, agrupadas
    const nb = appData.notebooks.find(n => n.id === nbId);
    if (!nb) return;
    const links = nb.links || [];
    const allIds = [nbId, ...links];
    
    // Desactivar filtros, usar vista especial
    activeSearch = '';
    activeTagFilter = '';
    document.getElementById('searchInput').value = '';
    currentNotebookId = null; // sin filtro único
    relatedViewNotebookId = nbId;
    showNotesView();
    
    // Renderizar agrupado
    const container = document.getElementById('notesGrid');
    container.innerHTML = '';
    
    const sortType = document.getElementById('sortSelect').value;
    
    allIds.forEach(id => {
        const curNb = appData.notebooks.find(n => n.id === id);
        if (!curNb) return;
        let notes = Object.values(appData.notes).filter(n => n.notebookId === id);
        notes.sort((a, b) => {
            switch(sortType) {
                case 'newest': return b.createdAt - a.createdAt;
                case 'oldest': return a.createdAt - b.createdAt;
                case 'title': return a.title.localeCompare(b.title);
                case 'titleDesc': return b.title.localeCompare(a.title);
                case 'size': return new Blob([b.content]).size - new Blob([a.content]).size;
                default: return 0;
            }
        });
        
        // Cabecera de grupo
        const header = document.createElement('div');
        header.className = 'related-group-header';
        header.style.borderLeftColor = curNb.color;
        header.innerHTML = `<span style="color:${curNb.color}">🕮</span> ${curNb.name} <span style="font-weight:normal;opacity:0.6;">(${notes.length} nota${notes.length!==1?'s':''})</span>`;
        container.appendChild(header);
        
        notes.forEach(note => {
            const card = document.createElement('div');
            card.className = 'note-card';
            card.onclick = () => openPreview(note.id);
            const size = new Blob([note.content]).size;
            card.innerHTML = `
                <div style="margin-bottom:10px;">
                    <div style="font-size:1rem;font-weight:bold;margin-bottom:6px;color:#888;text-shadow:1px 1px 0 #000;">${note.title || 'Sin título'}</div>
                    <div class="note-meta">
                        <span>${note.author || 'Sin autor'}</span>
                    </div>
                    <div class="note-meta">
                        <span title="Creación">✦ ${formatDateTime(note.createdAt)}</span>
                        <span title="Modificación">✎ ${note.updatedAt ? formatDateTime(note.updatedAt) : '-'}</span>
                        <span>${formatBytes(size)}</span>
                    </div>
                </div>
                <div class="note-tags">${note.tags.map(t=>`<span class="tag ${t==='urgente'?'tag-urgente':t==='importante'?'tag-importante':''}" onclick="event.stopPropagation();filterTag('${t}')">${t}</span>`).join('')}</div>
                <div class="note-preview"></div>
            `;
            const rpv = card.querySelector('.note-preview');
            rpv.innerHTML = marked.parse(note.content);
            rpv.querySelectorAll('input[type=checkbox]').forEach(cb => {
                const li = cb.closest('li');
                cb.setAttribute('disabled', '');
                if (li) { li.classList.add('task-list-item'); if (cb.checked) li.classList.add('checked'); }
            });
            container.appendChild(card);
        });

        // Card agregar nota — siempre al final del grupo
        const addCard = document.createElement('div');
        addCard.className = 'add-note-card';
        addCard.innerHTML = '+';
        addCard.title = `Nueva nota en ${curNb.name}`;
        addCard.onclick = () => openNoteModal(null, curNb.id);
        container.appendChild(addCard);
    });
    
    // Actualizar view-info
    const info = document.getElementById('viewInfo');
    const title = document.getElementById('viewTitle');
    info.style.display = 'flex';
    title.innerHTML = `<span style="color:${nb.color}">🕮</span> ${nb.name} + enlazadas`;
    document.getElementById('filterInfo').style.display = 'none';
    renderNotebooks();
    showToast(`Vista: ${nb.name} + ${links.length} enlazada${links.length!==1?'s':''}`);
}

function addNotebook() {
    const name = document.getElementById('newNotebookName').value.trim();
    if (!name) return showToast('Nombre requerido', 'error');
    const id = appData.nextNotebookId++;
    appData.notebooks.push({ id, name, color: '#4A90D9' });

    selectNotebook(id);
    showToast('Libreta creada');
}

function renameNotebook(id) {
    const nb = appData.notebooks.find(n => n.id === id);
    if (!nb) return;
    
    const newName = prompt('Nuevo nombre:', nb.name);
    if (newName && newName.trim()) {
        nb.name = newName.trim();
        saveData();
        renderNotebooks();
        if (currentNotebookId === id) updateViewInfo();
        showToast('Libreta renombrada');
    }
    
    if (document.getElementById('homeScreen').style.display !== 'none') {
    renderHomeScreen();
    }
}

function changeColor(id, color) {
    const nb = appData.notebooks.find(n => n.id === id);
    if (!nb) return;
    
    nb.color = color;
    saveData();
    renderNotebooks();
    if (currentNotebookId === id) updateViewInfo();
    showToast('Color actualizado');
    if (document.getElementById('homeScreen').style.display !== 'none') {
    renderHomeScreen();
    }
}

function deleteNotebook(id) {
    if (!confirm('¿Eliminar libreta y todas sus notas?')) return;
    
    appData.notebooks = appData.notebooks.filter(n => n.id !== id);
    Object.keys(appData.notes).forEach(k => {
        if (appData.notes[k].notebookId === id) delete appData.notes[k];
    });
    // Limpiar referencias bidireccionales
    appData.notebooks.forEach(nb => {
        if (nb.links) nb.links = nb.links.filter(lid => lid !== id);
    });
    
    if (currentNotebookId === id) currentNotebookId = null;
    
    saveData();
    renderNotebooks();
    renderNotes();
    updateViewInfo();
    showToast('Libreta eliminada'); {
    renderHomeScreen();
    }
}

// NOTAS
let _noteModalOriginal = null; // snapshot al abrir el modal

function _getNoteModalSnapshot() {
    return {
        title: document.getElementById('editNoteTitle').value,
        author: document.getElementById('editNoteAuthor').value,
        tags: document.getElementById('editNoteTags').value,
        content: document.getElementById('editNoteContent').value,
        notebookId: document.getElementById('editNoteNotebook').value
    };
}

function _noteModalHasChanges() {
    if (!_noteModalOriginal) return false;
    const cur = _getNoteModalSnapshot();
    return JSON.stringify(cur) !== JSON.stringify(_noteModalOriginal);
}

function openNoteModal(noteId = null, forceNotebookId = null) {
    const targetNotebookId = forceNotebookId || currentNotebookId;
    if (!noteId && !targetNotebookId) {
        showToast('Primero selecciona una libreta', 'error');
        toggleSidebar();
        return;
    }
    
    currentNoteId = noteId;
    const modal = document.getElementById('noteModal');
    
    const sel = document.getElementById('editNoteNotebook');
    sel.innerHTML = appData.notebooks.map(nb => 
        `<option value="${nb.id}" ${nb.id === (noteId ? appData.notes[noteId]?.notebookId : targetNotebookId) ? 'selected' : ''}>${nb.name}</option>`
    ).join('');
    
    if (noteId) {
        const n = appData.notes[noteId];
        document.getElementById('noteModalTitle').textContent = 'Editar Nota';
        document.getElementById('editNoteTitle').value = n.title;
        document.getElementById('editNoteAuthor').value = n.author;
        document.getElementById('editNoteTags').value = n.tags.join(', ');
        document.getElementById('editNoteContent').value = n.content;
    } else {
        document.getElementById('noteModalTitle').textContent = 'Nueva Nota';
        document.getElementById('editNoteTitle').value = '';
        document.getElementById('editNoteAuthor').value = '';
        document.getElementById('editNoteTags').value = '';
        document.getElementById('editNoteContent').value = '';
    }
    
    modal.classList.add('show');
    // Snapshot del estado inicial para detectar cambios
    setTimeout(() => { _noteModalOriginal = _getNoteModalSnapshot(); }, 0);
}

function saveNote() {
    const title = document.getElementById('editNoteTitle').value.trim() || 'Sin título';
    const author = document.getElementById('editNoteAuthor').value.trim();
    const tags = document.getElementById('editNoteTags').value.split(',').map(t => t.trim()).filter(t => t);
    const content = document.getElementById('editNoteContent').value;
    const notebookId = parseInt(document.getElementById('editNoteNotebook').value);
    
    if (!content.trim()) return showToast('Contenido vacío', 'error');
    
    if (currentNoteId) {
        appData.notes[currentNoteId] = {
            ...appData.notes[currentNoteId],
            title, author, tags, content, notebookId,
            updatedAt: Date.now()
        };
    } else {
        const id = appData.nextNoteId++;
        appData.notes[id] = { 
            id, notebookId, title, author, tags, content, 
            createdAt: Date.now(), updatedAt: Date.now() 
        };
        currentNoteId = id;
    }
    
    saveData();
    renderNotebooks();
    _noteModalOriginal = null;
    _noteModalOriginal = null;
    closeModal('noteModal');
    showToast('Nota guardada');
    if (relatedViewNotebookId) {
        openRelatedNotebooks(relatedViewNotebookId);
    } else {
        renderNotes();
    }
    openPreview(currentNoteId);
}

function deleteCurrentNote() {
    if (!currentNoteId || !confirm('¿Eliminar nota?')) return;
    delete appData.notes[currentNoteId];
    saveData();
    renderNotebooks();
    renderNotes();
    closeModal('noteModal');
    showToast('Nota eliminada');
}

function exportCurrentNote() {
    if (!currentNoteId) return;
    const note = appData.notes[currentNoteId];
    const blob = new Blob([`---\ntitle: ${note.title}\nauthor: ${note.author}\ntags: ${note.tags.join(', ')}\n---\n\n${note.content}`], {type: 'text/markdown'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `${note.title.replace(/[^a-z0-9]/gi, '_')}.md`;
    a.click();
    URL.revokeObjectURL(a.href);
    showToast('Nota exportada');
}

// PREVIEW
function openPreview(noteId) {
    currentNoteId = noteId;
    const note = appData.notes[noteId];
    const size = new Blob([note.content]).size;
    const notebook = appData.notebooks.find(n => n.id === note.notebookId);
    
    document.getElementById('previewTitle').textContent = note.title;
    // Renderizar body
    const previewBody = document.getElementById('previewBody');
    previewBody.innerHTML = marked.parse(note.content);
    // Postprocesar checkboxes en el DOM (evita problemas de regex sobre HTML)
    previewBody.querySelectorAll('input[type=checkbox]').forEach((cb, idx) => {
        const li = cb.closest('li');
        // Quitar disabled, habilitar interacción
        cb.removeAttribute('disabled');
        cb.style.cursor = 'pointer';
        // Aplicar clase y estilo verde si está marcado
        if (li) {
            li.classList.add('task-list-item');
            if (cb.checked) li.classList.add('checked');
        }
        cb.addEventListener('change', () => {
            const n = appData.notes[currentNoteId];
            let count = 0;
            n.content = n.content.replace(/- \[(x| )\] /g, (match) => {
                if (count === idx) { count++; return cb.checked ? '- [x] ' : '- [ ] '; }
                count++; return match;
            });
            n.updatedAt = Date.now();
            saveData();
            renderNotes();
            if (li) li.classList.toggle('checked', cb.checked);
        });
    });
    const notebookHtml = notebook ? (() => {
        const links = notebook.links || [];
        const hasLinks = links.length > 0;
        if (hasLinks) {
            const linkedNames = links.map(id => {
                const nb = appData.notebooks.find(x => x.id === id);
                return nb ? `${nb.name}` : '';
            }).filter(Boolean).join(', ');
            return `<div><div style="font-size:0.7rem;opacity:0.7;">Libreta</div><div style="font-weight:bold;color:${notebook.color};cursor:pointer;" onclick="closeModal('previewModal');openRelatedNotebooks(${notebook.id})" title="Ver enlazadas: ${linkedNames}">🕮 ${notebook.name} 🔗</div></div>`;
        }
        return `<div><div style="font-size:0.7rem;opacity:0.7;">Libreta</div><div style="font-weight:bold;color:${notebook.color};cursor:pointer;" onclick="closeModal('previewModal');selectNotebookFromCard(${notebook.id})">🕮 ${notebook.name}</div></div>`;
    })() : '';
    
    document.getElementById('previewMeta').innerHTML = `
        <div style="display: flex; flex-wrap: wrap; gap: 12px;">
            <div><div style="font-size:0.7rem;opacity:0.7;">Autor</div><div style="font-weight:bold;">${note.author || '-'}</div></div>
            <div><div style="font-size:0.7rem;opacity:0.7;">Creación</div><div style="font-weight:bold;">${formatDateTime(note.createdAt)}</div></div>
            <div><div style="font-size:0.7rem;opacity:0.7;">Modificación</div><div style="font-weight:bold;">${note.updatedAt ? formatDateTime(note.updatedAt) : '-'}</div></div>
            <div><div style="font-size:0.7rem;opacity:0.7;">Tamaño</div><div style="font-weight:bold;">${formatBytes(size)}</div></div>
            ${notebookHtml}
            <div style="flex:1;min-width:150px;"><div style="font-size:0.7rem;opacity:0.7;">Etiquetas</div><div>${note.tags.map(t => `<span class="tag" onclick="closeModal('previewModal'); filterTag('${t}')">${t}</span>`).join(' ')}</div></div>
        </div>
    `;
    document.getElementById('previewModal').classList.add('show');
    const pinBtn = document.getElementById('pinNoteBtn');
    pinBtn.style.opacity = note.pinned ? '1' : '0.4';
    pinBtn.title = note.pinned ? 'Desfijar nota' : 'Fijar nota';
}

// TAGS DROPDOWN (montado en body, position:fixed para escapar overflow del modal)
function getAllTags() {
    const tagSet = new Set();
    Object.values(appData.notes).forEach(n => n.tags.forEach(t => tagSet.add(t)));
    return [...tagSet].sort();
}

function openTagsDropdown(rect) {
    const input = document.getElementById('editNoteTags');
    const dropdown = document.getElementById('tagsDropdown');
    const allTags = getAllTags();
    if (allTags.length === 0) { dropdown.style.display = 'none'; return; }

    const current = input.value.split(',').map(t => t.trim()).filter(Boolean);
    const filtered = allTags.filter(t => !current.includes(t));

    if (filtered.length === 0) { dropdown.style.display = 'none'; return; }

    dropdown.innerHTML = filtered.map(t => {
        const style = t === 'urgente' ? 'background:#7f1d1d;color:#fecaca;' :
                      t === 'importante' ? 'background:#14532d;color:#bbf7d0;' : 'color:#e0e0e0;';
        return `<div style="padding:7px 12px;cursor:pointer;font-size:0.82rem;${style}"
            onmousedown="event.preventDefault();addTagFromDropdown('${t}')"
            onmouseover="this.style.filter='brightness(1.3)'" onmouseout="this.style.filter=''">${t}</div>`;
    }).join('');

    dropdown.style.left = rect.left + 'px';
    dropdown.style.top = (rect.bottom + 4) + 'px';
    dropdown.style.width = 'auto';
    dropdown.style.minWidth = '160px';
    dropdown.style.display = 'block';
}

function toggleTagsDropdown() {
    const dropdown = document.getElementById('tagsDropdown');
    if (dropdown.style.display === 'block') { dropdown.style.display = 'none'; return; }
    const btn = document.getElementById('tagsDropdownBtn');
    const rect = btn.getBoundingClientRect();
    openTagsDropdown(rect);
}

function addTagFromDropdown(tag) {
    const input = document.getElementById('editNoteTags');
    const parts = input.value.split(',').map(t => t.trim()).filter(Boolean);
    const lastRaw = input.value.split(',').pop().trim();
    if (lastRaw && tag.toLowerCase().startsWith(lastRaw.toLowerCase())) {
        parts.pop();
    }
    if (!parts.includes(tag)) parts.push(tag);
    input.value = parts.join(', ') + ', ';
    document.getElementById('tagsDropdown').style.display = 'none';
    input.focus();
    input.selectionStart = input.selectionEnd = input.value.length;
}

document.addEventListener('click', (e) => {
    const dd = document.getElementById('tagsDropdown');
    if (!dd) return;
    const isToggleBtn = e.target.closest('button') && e.target.closest('button').getAttribute('onclick') === 'toggleTagsDropdown()';
    if (!isToggleBtn && e.target.id !== 'editNoteTags' && !dd.contains(e.target)) {
        dd.style.display = 'none';
    }
});

function togglePinNote() {
    if (!currentNoteId) return;
    const note = appData.notes[currentNoteId];
    note.pinned = !note.pinned;
    saveData();
    const btn = document.getElementById('pinNoteBtn');
    btn.style.opacity = note.pinned ? '1' : '0.4';
    btn.title = note.pinned ? 'Desfijar nota' : 'Fijar nota';
    showToast(note.pinned ? '📌 Nota fijada' : 'Nota desfijada');
}

function toggleTagFilterDropdown() {
    const dd = document.getElementById('tagFilterDropdown');
    if (dd.style.display === 'block') { dd.style.display = 'none'; return; }
    const allTags = [...new Set(Object.values(appData.notes).flatMap(n => n.tags))].sort();
    if (allTags.length === 0) { showToast('No hay etiquetas', 'error'); return; }
    dd.innerHTML = allTags.map(t => `
        <div class="tfd-item ${activeTagFilter === t ? 'active' : ''}" onclick="applyTagFilter('${t}')">
            <span class="tag ${t==='urgente'?'tag-urgente':t==='importante'?'tag-importante':''}" style="pointer-events:none;">${t}</span>
        </div>
    `).join('');
    const btn = document.getElementById('tagFilterBtn');
    const rect = btn.getBoundingClientRect();
    dd.style.top = (rect.bottom + 6) + 'px';
    dd.style.left = rect.left + 'px';
    dd.style.display = 'block';
    setTimeout(() => {
        document.addEventListener('click', function closeDd(e) {
            if (!dd.contains(e.target) && e.target.id !== 'tagFilterBtn') {
                dd.style.display = 'none';
                document.removeEventListener('click', closeDd);
            }
        });
    }, 10);
}

function applyTagFilter(tag) {
    document.getElementById('tagFilterDropdown').style.display = 'none';
    if (activeTagFilter === tag) {
        activeTagFilter = '';
        document.getElementById('tagFilterBtn').classList.remove('active');
    } else {
        activeTagFilter = tag;
        document.getElementById('tagFilterBtn').classList.add('active');
    }
    showNotesView();
    renderNotes();
    updateFilterInfo();
}

function insertMD(pre, post) {
    const el = document.getElementById('editNoteContent');
    const start = el.selectionStart;
    const end = el.selectionEnd;
    const val = el.value;
    el.value = val.substring(0, start) + pre + val.substring(start, end) + post + val.substring(end);
    el.focus();
    el.selectionStart = el.selectionEnd = start + pre.length + (end - start);
}

function insertImgUrl() {
    const url = prompt('URL de la imagen:');
    if (!url || !url.trim()) return;
    const alt = prompt('Texto alternativo (opcional):') || 'imagen';
    insertMD(`![${alt}](${url.trim()})`, '');
}

function importMdFile(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
        const text = ev.target.result;
        // Intentar extraer frontmatter YAML (---) si existe
        const fmMatch = text.match(/^---\n([\s\S]*?)\n---\n\n?([\s\S]*)$/);
        const el = document.getElementById('editNoteContent');
        if (fmMatch) {
            const fm = fmMatch[1];
            const body = fmMatch[2];
            const titleMatch  = fm.match(/^title:\s*(.+)$/m);
            const authorMatch = fm.match(/^author:\s*(.+)$/m);
            const tagsMatch   = fm.match(/^tags:\s*(.+)$/m);
            if (titleMatch)  document.getElementById('editNoteTitle').value  = titleMatch[1].trim();
            if (authorMatch) document.getElementById('editNoteAuthor').value = authorMatch[1].trim();
            if (tagsMatch)   document.getElementById('editNoteTags').value   = tagsMatch[1].trim();
            el.value = body;
        } else {
            el.value = text;
        }
        showToast('Archivo .md importado');
    };
    reader.readAsText(file);
    e.target.value = '';
}



// BACKUP
function exportData() {
    const d = new Date();
    const blob = new Blob([JSON.stringify(appData, null, 2)], {type: 'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `libretas_${d.getFullYear()}-${(d.getMonth()+1).toString().padStart(2,'0')}-${d.getDate().toString().padStart(2,'0')}_${d.getHours().toString().padStart(2,'0')}-${d.getMinutes().toString().padStart(2,'0')}.json`;
    a.click();
    URL.revokeObjectURL(a.href);
    _dataSnapshotOnLoad = JSON.stringify(appData);
    const badge = document.getElementById('unsavedBadge');
    if (badge) badge.style.display = 'none';
    showToast('Backup exportado');
}

function importData(e) {
    const file = e.target.files[0];
    if (!file) return;
    
    const reader = new FileReader();
    reader.onload = (ev) => {
        try {
            const data = JSON.parse(ev.target.result);
            if (data.notebooks && data.notes) {
                appData = data;
                saveData();
                currentNotebookId = null;
                activeSearch = '';
                activeTagFilter = '';
                renderNotebooks();
                renderNotes();
                updateViewInfo();
                showToast('Backup importado');
            } else throw new Error('Formato inválido');
        } catch (err) {
            showToast('Error al importar', 'error');
        }
    };
    reader.readAsText(file);
    e.target.value = '';
}

function clearAllData() {
    if (!confirm('¿BORRAR TODO?')) return;
    appData = { notebooks: [], notes: {}, nextNotebookId: 1, nextNoteId: 1 };
    currentNotebookId = null;
    saveData();
    renderNotebooks();
    renderNotes();
    updateViewInfo();
    showToast('Datos eliminados');
}

// README - CORREGIDO
function openReadme() {
    document.getElementById('readmeModal').classList.add('show');
    switchReadmeTab('ES');
}

function switchReadmeTab(lang) {
    const content = document.getElementById(lang === 'EN' ? 'readme-en' : 'readme-es').textContent;
    document.getElementById('readmeContent').innerHTML = marked.parse(content);
    
    // Actualizar estilos de botones
    const esBtn = document.getElementById('tabES');
    const enBtn = document.getElementById('tabEN');
    
    if (lang === 'ES') {
        esBtn.style.background = '#4f46e5';
        esBtn.style.color = 'white';
        enBtn.style.background = '';
        enBtn.style.color = '';
    } else {
        enBtn.style.background = '#4f46e5';
        enBtn.style.color = 'white';
        esBtn.style.background = '';
        esBtn.style.color = '';
    }
}

function toggleTheme() {
    const isLight = document.body.classList.toggle('light');
    storage.setItem('theme', isLight ? 'light' : 'dark');
    document.getElementById('themeToggleBtn').textContent = isLight ? '🌙' : '☀️';
    renderNotebooks();
}

function applyTheme() {
    const theme = storage.getItem('theme') || 'dark';
    if (theme === 'light') {
        document.body.classList.add('light');
        document.getElementById('themeToggleBtn').textContent = '🌙';
    }
}

function closeModal(id) {
    if (id === 'noteModal' && _noteModalHasChanges()) {
        if (!confirm('Hay cambios sin guardar. ¿Cerrar sin guardar?')) return;
    }
    if (id === 'noteModal') _noteModalOriginal = null;
    document.getElementById(id).classList.remove('show');
    // Si la home está visible, refrescarla
    if (document.getElementById('homeScreen').style.display !== 'none') {
        renderHomeScreen();
    }
}

document.querySelectorAll('.modal').forEach(m => {
    m.addEventListener('click', (e) => { if (e.target === m) closeModal(m.id); });
});

// INICIALIZAR
applyTheme();
renderNotebooks();
renderHomeScreen(); // pantalla de inicio
updateViewInfo();

// Alerta al salir si hay cambios (backup)
let _dataSnapshotOnLoad = null;
setTimeout(() => { _dataSnapshotOnLoad = JSON.stringify(appData); }, 500);
window.addEventListener('beforeunload', (e) => {
    if (_dataSnapshotOnLoad && JSON.stringify(appData) !== _dataSnapshotOnLoad) {
        e.preventDefault();
        e.returnValue = '';
        return '';
    }
});

document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
        document.querySelectorAll('.modal.show').forEach(m => closeModal(m.id));
        if (sidebarOpen) toggleSidebar();
    }
});

// Ocultar tooltip de libreta relacionada en cualquier clic o scroll
document.addEventListener('click', () => hideNbTooltip(), true);
document.addEventListener('scroll', () => hideNbTooltip(), true);
</script>
